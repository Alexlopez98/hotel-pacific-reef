{% load static %}
<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pacific Reef - Explora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="{% static 'css/index.css' %}" rel="stylesheet">
    <style>
        :root {
            --color-primario: #432C81;
            --color-secundario: #99CBCE;
        }

        .habitacion-card {
            transition: transform 0.3s;
        }

        .habitacion-card:hover {
            transform: translateY(-5px);
        }

        .btn-reservar {
            background-color: var(--color-secundario);
            border-radius: 8px;
            transition: 0.3s;
            color: white !important;
        }

        .btn-reservar:hover {
            background-color: #7ab3b7;
        }

        .italic {
            font-style: italic;
        }
    </style>
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar border-bottom border-dark py-2" style="background-color: var(--color-secundario);">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <a href="{% url 'index' %}">
                <img src="{% static 'img/logo.png' %}" alt="Pacific Reef" style="height: 45px;">
            </a>
            <div class="d-flex align-items-center gap-3">
                {% if user.is_authenticated %}
                <!-- Si está logeado, va al perfil -->
                <a href="{% url 'perfil_usuario' %}" class="text-dark">
                    <i class="fas fa-user-circle fa-2x" style="color: var(--color-primario);"></i>
                </a>
                {% else %}
                <!-- Si NO está logeado, va al login -->
                <a href="{% url 'login' %}" class="text-dark">
                    <i class="far fa-user-circle fa-2x" style="color: var(--color-primario);"></i>
                </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container py-5 flex-grow-1">
        <h1 class="display-5 fw-bold text-center mb-5" style="font-family: serif; color: var(--color-primario);">
            EXPLORA NUESTRAS HABITACIONES
        </h1>

        <div class="row g-4 justify-content-center">
            {% for hab in habitaciones %}
            <div class="col-md-4 habitacion-card">
                <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden">
                    {% if hab.imagen %}
                    <img src="{{ hab.imagen.url }}" class="card-img-top" style="height: 200px; object-fit: cover;">
                    {% else %}
                    <img src="{% static 'img/room1.jpg' %}" class="card-img-top"
                        style="height: 200px; object-fit: cover;">
                    {% endif %}

                    <div class="card-body p-4 d-flex flex-column">
                        <h5 class="fw-bold mb-1" style="color: var(--color-primario);">
                            {{ hab.categoria }}
                        </h5>

                        <p class="small text-secondary mb-3 italic">"{{ hab.descripcion|truncatechars:80 }}"</p>

                        <div class="mt-auto pt-3 border-top text-center">
                            <div class="mb-3">
                                <!-- Le ponemos una clase para identificar el precio y un data-value con el número limpio -->
                                <span class="fw-bold fs-4 d-block precio-formatear"
                                    style="color: var(--color-primario);"
                                    data-valor="{{ hab.precio_diario|floatformat:0 }}">
                                </span>
                                <small class="text-muted">/ noche</small>
                            </div>

                            <a href="{% url 'roomdetail' hab.id_habitacion %}"
                                class="btn btn-reservar w-100 text-uppercase fw-bold shadow-sm">
                                Ver detalles
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SCRIPT PARA LOS PUNTOS -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const precios = document.querySelectorAll('.precio-formatear');

            precios.forEach(span => {
                let valor = span.dataset.valor;

                // 🧠 Si viene vacío o undefined → 0
                if (!valor) {
                    valor = "0";
                }

                // 🔥 limpiar cualquier formato raro
                valor = valor.replace(/[^\d]/g, '');

                // convertir a número seguro
                valor = Number(valor);

                // 🛡️ evitar NaN
                if (isNaN(valor)) valor = 0;

                span.innerText = '$' + valor.toLocaleString('es-CL');
            });
        });
    </script>
</body>

</html>
