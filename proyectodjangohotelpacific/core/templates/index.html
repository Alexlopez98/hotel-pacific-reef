{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pacific Reef - Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/index.css' %}" rel="stylesheet">
  </head>
  <body>
    <div class="border-bottom border-dark p-5" style="background-color: #99CBCE;"></div>
    
    <div class="d-flex justify-content-center align-items-center" style="min-height: 50vh;">
      <div class="text-center">
          <img src="{% static 'img/logo.png' %}" 
               alt="Logo Pacific Reef" 
               class="img-fluid" 
               style="width: 400px;">
      </div>
    </div>

    <div class="row justify-content-center align-items-center mt-4">

      <div class="col-auto">
          <h2 class="fw-bold m-0" style="color: #432C81; font-size: 1.5rem; text-align: center;">
              Bienvenid@ a<br>Pacific Reef
          </h2>
      </div>

      <div class="col-md-2">
        <div class="d-grid gap-2">
            <button id="btn-acceder" class="btn shadow-sm fw-bold text-white py-3 btn-aqua-custom" 
                style="background-color: #99CBCE; border: none;">
            Acceder
            </button>
        
            <button id="btn-registrarse" class="btn fw-bold py-3 btn-purple-outline" 
                style="color: #432C81; border: #432C81 1px solid; background-color: transparent;">
            Registrarse
            </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Asegúrate de que 'login' y 'registro' sean los nombres exactos
        // que pusiste en el parámetro "name" de tu archivo urls.py
        const urlAcceder = "{% url 'login' %}"; 
        const urlRegistrarse = "{% url 'registro' %}";
    </script>

    <script src="{% static 'js/index.js' %}"></script>
  </body>
</html>
