{% load static %}
<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pacific Reef - Mi Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --color-primario: #432C81;
            --color-secundario: #207b80;
            --bg-perfil: #0e6d72;
        }

        body {
            background-color: var(--bg-perfil);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card-profile {
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .nav-link-profile {
            color: #333;
            padding: 12px 15px;
            border-radius: 10px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            text-decoration: none;
            width: 100%;
            background: none;
            border: none;
        }

        .nav-link-profile:hover {
            background-color: #f0ecf7;
            color: var(--color-primario);
        }

        .nav-link-profile i {
            width: 30px;
            font-size: 1.1rem;
        }

        .profile-pic-container {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .form-label-custom {
            font-weight: 500;
            color: #666;
        }

        .btn-save {
            background-color: #3b82f6;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>

<body class="py-5">

    <div class="container">
        <div class="mb-4">
            <a href="{% url 'index' %}" class="text-white text-decoration-none small">
                <i class="fas fa-arrow-left"></i> Volver a Pacific Reef
            </a>
        </div>

        <div class="row g-4">
            
            <!-- COLUMNA IZQUIERDA -->
            <div class="col-lg-4">
                <div class="card card-profile p-4">
                    <div class="d-flex align-items-center mb-4">
                        <img src="https://ui-avatars.com/api/?name={{ user.first_name }}+{{ user.last_name }}&background=432C81&color=fff" 
                             class="rounded-circle me-3" width="60">
                        <div>
                            <h6 class="fw-bold mb-0">{{ user.username }}</h6>
                            <small class="text-muted">{{ user.email }}</small>
                        </div>
                    </div>

                    <nav class="d-flex flex-column gap-2">
                        <a href="{% url 'perfil' %}" class="nav-link-profile">
                            <i class="fas fa-user"></i> Mis Datos
                        </a>
                        <!-- Aquí podrías crear una vista para ver las reservas del usuario -->
                        <a href="#" class="nav-link-profile">
                            <i class="fas fa-concierge-bell"></i> Mis Reservas
                        </a>
                        
                        <form action="{% url 'logout' %}" method="post" class="m-0 pt-3 border-top mt-2">
                            {% csrf_token %}
                            <button type="submit" class="nav-link-profile text-danger border-0 bg-transparent">
                                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                            </button>
                        </form>
                    </nav>
                </div>
            </div>

            <!-- COLUMNA DERECHA -->
            <div class="col-lg-8">
                <div class="card card-profile p-5 h-100">
                    <h4 class="fw-bold mb-4" style="color: var(--color-primario);">Información Personal</h4>
                    <hr>

                    <form class="mt-4">
                        <div class="row mb-4 align-items-center">
                            <label class="col-sm-4 form-label-custom">Nombre de usuario</label>
                            <div class="col-sm-8">
                                <input type="text" class="form-control border-0 bg-light py-2" value="{{ user.username }}" readonly>
                            </div>
                        </div>

                        <div class="row mb-4 align-items-center">
                            <label class="col-sm-4 form-label-custom">Email</label>
                            <div class="col-sm-8">
                                <input type="email" class="form-control border-0 bg-light py-2" value="{{ user.email }}" readonly>
                            </div>
                        </div>

                        <div class="row mb-4 align-items-center">
                            <label class="col-sm-4 form-label-custom">Nombre</label>
                            <div class="col-sm-8">
                                <input type="text" class="form-control border-0 bg-light py-2" value="{{ user.first_name }}" placeholder="No especificado">
                            </div>
                        </div>

                        <div class="row mb-5 align-items-center">
                            <label class="col-sm-4 form-label-custom">Apellido</label>
                            <div class="col-sm-8">
                                <input type="text" class="form-control border-0 bg-light py-2" value="{{ user.last_name }}" placeholder="No especificado">
                            </div>
                        </div>

                        <div class="mt-auto pt-4 border-top">
                            <button type="button" class="btn btn-save text-white shadow-sm">Actualizar Información</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
